worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Orchestrator dashboard + unified gateway
    server {
        listen 9080;

        resolver 127.0.0.11 valid=10s ipv6=off;

        location / {
            set $orchestrator_upstream "app:9000";
            proxy_pass http://$orchestrator_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /acciones/ {
            proxy_pass http://host.docker.internal:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /compraventa/ {
            proxy_pass http://host.docker.internal:8002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /libro/ {
            proxy_pass http://host.docker.internal:8003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ideas/ {
            proxy_pass http://host.docker.internal:8004/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /casas/ {
            proxy_pass http://host.docker.internal:8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Direct proxy servers for each MVP
    server {
        listen 8001;
        location / {
            proxy_pass http://host.docker.internal:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 8002;
        location / {
            proxy_pass http://host.docker.internal:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 8003;
        location / {
            proxy_pass http://host.docker.internal:8003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 8004;
        location / {
            proxy_pass http://host.docker.internal:8004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 8005;
        location / {
            proxy_pass http://host.docker.internal:8005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
