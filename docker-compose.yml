services:
  db:
    image: postgres:16-alpine
    container_name: orquestador_db
    environment:
      POSTGRES_USER: orquestador
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orquestador_secret}
      POSTGRES_DB: orquestador
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orquestador"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orquestador_redis
    command: redis-server --appendonly yes
    ports:
      - "6383:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: orquestador_app
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://orquestador:${POSTGRES_PASSWORD:-orquestador_secret}@db:5432/orquestador
      REDIS_URL: redis://redis:6379/0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/fabian/workSpace:/workspace:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: orquestador_nginx
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
      - "9080:9080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
